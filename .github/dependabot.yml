version: 2

updates:
  # Ruby gems
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Mirror the 7-day cooldown set on the rubygems source in the Gemfile:
    # don't open a PR until a release has been public for a week.
    cooldown:
      default-days: 7
    groups:
      # Batch low-risk bumps into a single PR to cut review noise.
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Docker base image (ruby:3.4.5-slim in the Dockerfile)
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  # The GitHub Actions used by the workflows in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions:
        update-types: ["minor", "patch"]
