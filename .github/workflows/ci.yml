name: CI

# Run on every push to main and on every PR targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    env:
      RACK_ENV: test
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ruby/setup-ruby@v1.314.0
        with:
          # ruby-version is read from .ruby-version automatically.
          bundler-cache: true # bundle install + cache gems keyed on Gemfile.lock
      - name: Prepare test database
        run: bundle exec rake db:create db:migrate
      - name: Run specs
        run: bundle exec rspec

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ruby/setup-ruby@v1.314.0
        with:
          bundler-cache: true
      - name: RuboCop
        run: bundle exec rubocop --no-server

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ruby/setup-ruby@v1.314.0
        with:
          bundler-cache: true
      - name: bundler-audit
        run: bundle exec bundle-audit check --update
