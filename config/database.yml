# frozen_string_literal: true
#
# Per-environment database config. The active section is chosen by RACK_ENV
# (set in spec_helper.rb for tests). Paths are relative to the app root and
# stay relative in every environment: in the container the volume is mounted
# at ./db, so the same path resolves to the persistent disk there.

default: &default
  adapter: sqlite3
  pool: 5 # matches Puma's default thread count
  timeout: 5000 # concurrent writes wait instead of complaining "database is locked"
  # Applied per-connection by the sqlite3 adapter (AR 7.1+).
  pragmas:
    # WAL: readers and the single writer no longer block each other
    journal_mode: WAL
    # NORMAL: fsync only at checkpoints, not every commit - much faster, never corrupts
    # a power cut (not an app restart) can lose the last few committed writes, acceptable here
    synchronous: NORMAL
    # SQLite doesn't enforce foreign keys unless asked per-connection - on for future tables
    foreign_keys: true

development:
  <<: *default
  database: db/comments_dev.sqlite3

test:
  <<: *default
  database: db/comments_test.sqlite3

staging:
  <<: *default
  database: db/comments_staging.sqlite3

production:
  <<: *default
  database: db/comments_prod.sqlite3
